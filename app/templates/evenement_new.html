<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Événements</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Gestion des Événements</h1>

            <!-- Formulaire de création d'événement -->
            {% if user.is_admin or user.role == 'codep' %}
            <form method="POST" action="{{ url_for('main_bp.evenement_new') }}">
                <label for="nom">Nom de l'événement</label>
                <input type="text" name="nom" placeholder="Ex: CAI - Incendie 2025" required>

                <label for="type_evt">Type d'événement</label>
                <select name="type_evt" required>
                    <option value="CAI">CAI</option>
                    <option value="CHU">CHU</option>
                    <option value="PRV">PRV</option>
                </select>

                <button type="submit" name="action" value="create">Créer un événement</button>
            </form>
            {% endif %}

            {% if evenements %}
            <hr>
            <!-- Sélection d'un événement existant -->
            <form method="POST" action="{{ url_for('main_bp.evenement_new') }}">
                <label for="evenement_id">Sélectionner un événement</label>
                <select name="evenement_id" required>
                    {% for evt in evenements %}
                        <option value="{{ evt.id }}">{{ evt.nom }} ({{ evt.numero }})</option>
                    {% endfor %}
                </select>

                <button type="submit" name="action" value="select">Accéder à l'événement</button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
