<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer ou Rejoindre un Événement</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #00477e, #ff7e00);
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
            font-size: 16px;
        }

        button {
            margin-top: 25px;
            background-color: #ff7e00;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #e46d00;
        }

        .note {
            font-size: 0.9em;
            margin-top: 10px;
            color: #ddd;
        }

        .divider {
            height: 2px;
            background: #ffffff33;
            margin: 30px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Gestion des Événements</h1>

    {% if user.is_admin or user.role == 'codep' %}
    <form method="POST" action="{{ url_for('main_bp.evenement_new') }}">
        <h2>Créer un Nouvel Événement</h2>
        <label for="nom">Nom de l’événement :</label>
        <input type="text" id="nom" name="nom" required>

        <label for="type_evt">Type :</label>
        <select id="type_evt" name="type_evt" required>
            <option value="CAI">CAI</option>
            <option value="CHU">CHU</option>
            <option value="PRV">PRV</option>
        </select>

        <button type="submit">Créer l'événement</button>
    </form>
    {% endif %}

    <div class="divider"></div>

    <form method="POST" action="{{ url_for('main_bp.evenement_select') }}">
        <h2>Rejoindre un Événement existant</h2>

        <label for="evenement_id">Événement :</label>
        <select name="evenement_id" id="evenement_id" required>
            {% for evt in evenements %}
                {% if user.is_admin or user.role == 'codep' or evt in user.evenement %}
                    <option value="{{ evt.id }}">{{ evt.nom }} ({{ evt.numero }})</option>
                {% endif %}
            {% endfor %}
        </select>

        <button type="submit">Rejoindre</button>
    </form>

    <p class="note">Vous devez être rattaché à un événement pour accéder au tableau de bord.</p>
</div>
</body>
</html>
