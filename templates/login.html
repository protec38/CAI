<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion CAI</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; margin-top: 50px; color: #333; }
    h2 { color: #004b9b; }
    form { background: white; padding: 20px; border-radius: 8px; border-top: 5px solid #f26522; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    label { font-weight: bold; display: block; margin: 10px 0 5px; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { background-color: #004b9b; color: white; padding: 10px; width: 100%; margin-top: 15px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: #003570; }
  </style>
</head>
<body>
  <h2>Connexion - Centre d’Accueil</h2>
  <form method="POST">
    <label>Nom d'utilisateur</label>
    <input type="text" name="username" required>
    <label>Mot de passe</label>
    <input type="password" name="password" required>
    <button type="submit">Se connecter</button>
  </form>
</body>
</html>
