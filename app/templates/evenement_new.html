<!-- 📄 app/templates/evenement_new.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer ou sélectionner un évènement</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Centre d'Accueil d'Urgence - Gestion des Événements</h1>

        {% if user and (user.is_admin or user.role == 'codep') %}
            <h2>Créer un nouvel évènement</h2>
            <form method="POST">
                <label for="nom">Nom de l’évènement</label>
                <input type="text" name="nom" required>

                <label for="type_evt">Type (CAI / CHU)</label>
                <select name="type_evt" required>
                    <option value="CAI">CAI</option>
                    <option value="CHU">CHU</option>
                </select>

                <button type="submit">Créer l’évènement</button>
            </form>
            <hr>
        {% endif %}

        <h2>Choisir un évènement existant</h2>
        <form method="POST" action="{{ url_for('main_bp.select_evenement') }}">
            <label for="evenement_id">Évènement</label>
            <select name="evenement_id" required>
                {% for evt in evenements %}
                    <option value="{{ evt.id }}">{{ evt.nom }} ({{ evt.numero }})</option>
                {% endfor %}
            </select>
            <button type="submit">Accéder</button>
        </form>

        <p><a href="{{ url_for('main_bp.logout') }}">Déconnexion</a></p>
    </div>
</body>
</html>
