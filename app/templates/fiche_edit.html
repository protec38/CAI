{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>✏️ Modifier une fiche impliqué</h2>

    <form method="POST">
        <div class="row">
            <div class="col-md-6">
                <label for="nom">Nom</label>
                <input type="text" name="nom" class="form-control" value="{{ fiche.nom }}" required>

                <label for="prenom">Prénom</label>
                <input type="text" name="prenom" class="form-control" value="{{ fiche.prenom }}">

                <label for="statut">Statut</label>
                <select name="statut" class="form-control" required>
                    <option value="présent" {% if fiche.statut == "présent" %}selected{% endif %}>Présent</option>
                    <option value="sorti" {% if fiche.statut == "sorti" %}selected{% endif %}>Sorti</option>
                    <option value="supprimé" {% if fiche.statut == "supprimé" %}selected{% endif %}>Supprimé</option>
                </select>

                <label for="telephone">Téléphone</label>
                <input type="text" name="telephone" class="form-control" value="{{ fiche.telephone }}">

                <label for="nationalite">Nationalité</label>
                <input type="text" name="nationalite" class="form-control" value="{{ fiche.nationalite }}">
            </div>

            <div class="col-md-6">
                <label for="difficulte">Difficulté</label>
                <textarea name="difficulte" class="form-control">{{ fiche.difficulte }}</textarea>

                <label for="competence">Compétences</label>
                <textarea name="competence" class="form-control">{{ fiche.competence }}</textarea>

                <label for="adresse">Adresse</label>
                <input type="text" name="adresse" class="form-control" value="{{ fiche.adresse }}">

                <label for="date_naissance">Date de naissance</label>
                <input type="date" name="date_naissance" class="form-control"
                       value="{{ fiche.date_naissance.strftime('%Y-%m-%d') if fiche.date_naissance }}">

                <div class="form-check mt-2">
                    <input type="checkbox" class="form-check-input" name="est_animal" id="est_animal"
                           {% if fiche.est_animal %}checked{% endif %}>
                    <label class="form-check-label" for="est_animal">Est un animal</label>
                </div>

                <label for="recherche_personne">Recherche personne</label>
                <input type="text" name="recherche_personne" class="form-control" value="{{ fiche.recherche_personne }}">

                <label for="numero_recherche">N° recherche</label>
                <input type="text" name="numero_recherche" class="form-control" value="{{ fiche.numero_recherche }}">
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">💾 Sauvegarder</button>
            <a href="{{ url_for('main_bp.dashboard', evenement_id=fiche.evenement.id) }}" class="btn btn-secondary">Retour</a>
        </div>
    </form>
</div>
{% endblock %}
