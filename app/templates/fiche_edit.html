<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier une fiche impliqué</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #002f6c, #ff6f00);
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #002f6c;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .form-group {
            flex: 1 1 45%;
            display: flex;
            flex-direction: column;
        }

        .form-group-full {
            flex: 1 1 100%;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #002f6c;
        }

        input, select, textarea {
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        select[multiple] {
            min-height: 150px;
        }

        small {
            font-size: 13px;
            color: #777;
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: #ff6f00;
            color: white;
            padding: 14px 25px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #e65c00;
        }

        .btn-secondary {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 20px;
            background: #ccc;
            color: #000;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .form-group {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-edit"></i> Modifier la fiche impliqué</h1>

    <form method="POST">
        <div class="form-group">
            <label for="nom">Nom <span style="color:red">*</span></label>
            <input type="text" name="nom" value="{{ fiche.nom }}" maxlength="40" required>
        </div>

        <div class="form-group">
            <label for="prenom">Prénom <span style="color:red">*</span></label>
            <input type="text" name="prenom" value="{{ fiche.prenom }}" maxlength="40" required>
        </div>

        <div class="form-group">
            <label for="date_naissance">Date de naissance <span style="color:red">*</span></label>
            <input type="date" name="date_naissance" value="{{ fiche.date_naissance.strftime('%Y-%m-%d') if fiche.date_naissance }}" required>
        </div>

        <div class="form-group">
            <label for="telephone"><i class="fas fa-phone"></i> Téléphone</label>
            <input type="text" name="telephone" value="{{ fiche.telephone }}" maxlength="15">
        </div>

        <div class="form-group">
            <label for="adresse"><i class="fas fa-home"></i> Adresse</label>
            <input type="text" name="adresse" value="{{ fiche.adresse }}" maxlength="100">
        </div>

        <div class="form-group">
            <label for="nationalite"><i class="fas fa-flag"></i> Nationalité</label>
            <input type="text" name="nationalite" value="{{ fiche.nationalite }}" maxlength="50">
        </div>

        <div class="form-group">
            <label for="numero_recherche">N° recherche</label>
            <input type="text" name="numero_recherche" value="{{ fiche.numero_recherche }}" maxlength="50">
        </div>

        <div class="form-group">
            <label for="recherche_personne"><i class="fas fa-search"></i> Recherche personne</label>
            <input type="text" name="recherche_personne" value="{{ fiche.recherche_personne }}" maxlength="200">
        </div>

        <div class="form-group">
            <label for="difficulte"><i class="fas fa-exclamation-circle"></i> Difficultés</label>
            <textarea name="difficulte" rows="2" maxlength="200">{{ fiche.difficultes }}</textarea>
        </div>

        <div class="form-group">
            <label for="competences"><i class="fas fa-tools"></i> Compétences</label>
            <select name="competences" multiple size="6" class="form-control">
                {% for c in competences_list %}
                    <option value="{{ c }}" {% if c in fiche.competences.split(',') %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
            <small>Maintenez Ctrl (Windows) ou Cmd (Mac) pour sélectionner plusieurs compétences.</small>
        </div>

        <div class="form-group">
            <label for="effets_perso"><i class="fas fa-suitcase"></i> Effets personnels</label>
            <input type="text" name="effets_perso" value="{{ fiche.effets_perso }}">
        </div>

        <div class="form-group">
            <label for="destination"><i class="fas fa-location-arrow"></i> Destination</label>
            <input type="text" name="destination" value="{{ fiche.destination }}">
        </div>

        <div class="form-group">
            <label for="moyen_transport"><i class="fas fa-bus"></i> Moyen de transport</label>
            <input type="text" name="moyen_transport" value="{{ fiche.moyen_transport }}">
        </div>

        <div class="form-group">
            <label for="statut"><i class="fas fa-traffic-light"></i> Statut</label>
            <select name="statut" required>
                <option value="présent" {% if fiche.statut == "présent" %}selected{% endif %}>Présent</option>
                <option value="sorti" {% if fiche.statut == "sorti" %}selected{% endif %}>Sorti</option>
                <option value="supprimé" {% if fiche.statut == "supprimé" %}selected{% endif %}>Supprimé</option>
            </select>
        </div>

        <div class="form-group-full">
            <button type="submit"><i class="fas fa-save"></i> Sauvegarder</button>
            <a href="{{ url_for('main_bp.dashboard', evenement_id=fiche.evenement.id) }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
    </form>
</div>

</body>
</html>
