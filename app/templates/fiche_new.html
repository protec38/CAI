{% extends "base.html" %}
{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4">Créer une fiche impliqué</h2>
    <form method="POST" action="{{ url_for('main_bp.fiche_new') }}">
        <!-- Numéro de fiche (lecture seule) -->
        <div class="form-group mb-3">
            <label for="numero_fiche">Numéro de fiche</label>
            <input type="text" class="form-control" id="numero_fiche" name="numero_fiche" value="{{ numero_fiche }}" readonly>
        </div>

        <!-- Heure d’arrivée (heure actuelle par défaut) -->
        <div class="form-group mb-3">
            <label for="date_entree">Heure d’arrivée</label>
            <input type="datetime-local" class="form-control" id="date_entree" name="date_entree" value="{{ current_time }}">
        </div>

        <!-- Coche humain/animal -->
        <div class="form-group mb-3">
            <label>Type d'impliqué</label><br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="humain" id="humain" value="True" checked>
                <label class="form-check-label" for="humain">Humain</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="humain" id="animal" value="False">
                <label class="form-check-label" for="animal">Animal</label>
            </div>
        </div>

        <!-- Nom -->
        <div class="form-group mb-3">
            <label for="nom">Nom</label>
            <input type="text" class="form-control" id="nom" name="nom" maxlength="50" required>
        </div>

        <!-- Prénom -->
        <div class="form-group mb-3">
            <label for="prenom">Prénom</label>
            <input type="text" class="form-control" id="prenom" name="prenom" maxlength="50">
        </div>

        <!-- Date de naissance -->
<div class="form-group mb-3">
    <label for="date_naissance">Date de naissance</label>
    <input type="date" class="form-control" id="date_naissance" name="date_naissance">
    <small id="age_calculated" class="form-text text-muted mt-1"></small>
</div>


        <!-- Nationalité -->
        <div class="form-group mb-3">
            <label for="nationalite">Nationalité</label>
            <input type="text" class="form-control" id="nationalite" name="nationalite">
        </div>

        <!-- Adresse -->
        <div class="form-group mb-3">
            <label for="adresse">Adresse</label>
            <input type="text" class="form-control" id="adresse" name="adresse" maxlength="150">
        </div>

        <!-- Téléphone -->
        <div class="form-group mb-3">
            <label for="telephone">Téléphone</label>
            <input type="tel" class="form-control" id="telephone" name="telephone">
        </div>

        <!-- Personne à prévenir -->
        <div class="form-group mb-3">
            <label for="personne_a_prevenir">Personne à prévenir</label>
            <input type="text" class="form-control" id="personne_a_prevenir" name="personne_a_prevenir" maxlength="50">
        </div>

        <!-- Téléphone personne à prévenir -->
        <div class="form-group mb-3">
            <label for="tel_personne_a_prevenir">Téléphone de la personne à prévenir</label>
            <input type="tel" class="form-control" id="tel_personne_a_prevenir" name="tel_personne_a_prevenir">
        </div>

        <!-- Recherche de personne -->
        <div class="form-group mb-3">
            <label for="recherche_personne">Recherche de personne</label>
            <textarea class="form-control" id="recherche_personne" name="recherche_personne" maxlength="300"></textarea>
        </div>

        <!-- Difficulté -->
        <div class="form-group mb-3">
            <label for="difficulte">Difficultés particulières</label>
            <textarea class="form-control" id="difficulte" name="difficulte" maxlength="300"></textarea>
        </div>

        <!-- Compétences -->
        <div class="form-group mb-3">
            <label for="competences">Compétences</label>
            <textarea class="form-control" id="competences" name="competences" maxlength="300"></textarea>
        </div>

        <!-- Effets personnels -->
        <div class="form-group mb-3">
            <label for="effets_perso">Effets personnels</label>
            <textarea class="form-control" id="effets_perso" name="effets_perso" maxlength="300"></textarea>
        </div>

        <!-- Nom du créateur (readonly) -->
        <div class="form-group mb-3">
            <label for="nom_createur">Nom du créateur</label>
            <input type="text" class="form-control" id="nom_createur" name="nom_createur" value="{{ user.nom }}" readonly>
        </div>

        <!-- Prénom du créateur (readonly) -->
        <div class="form-group mb-4">
            <label for="prenom_createur">Prénom du créateur</label>
            <input type="text" class="form-control" id="prenom_createur" name="prenom_createur" value="{{ user.prenom }}" readonly>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100">Enregistrer la fiche</button>
    </form>
</div>
{% endblock %}
