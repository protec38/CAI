<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sélection du rôle</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h2>Bienvenue {{ user.nom }} {{ user.prenom }}</h2>
    <form method="POST">
      <label>Choisir un événement :</label>
      <select name="evenement_id" required>
        {% for evt in evenements %}
          <option value="{{ evt.id }}">{{ evt.nom }} ({{ evt.numero }})</option>
        {% endfor %}
      </select>

      <label>Choisir votre rôle :</label>
      <select name="role" required>
        {% for role in roles %}
          <option value="{{ role }}">{{ role | capitalize }}</option>
        {% endfor %}
      </select>

      <button type="submit">Continuer</button>
    </form>

    <a href="{{ url_for('main.logout') }}">Déconnexion</a>
  </div>
</body>
</html>
