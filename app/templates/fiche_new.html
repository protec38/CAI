<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Fiche Impliqué</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Roboto + FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #002f6c, #ff6f00);
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #002f6c;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .form-group {
            flex: 1 1 45%;
            display: flex;
            flex-direction: column;
        }

        .form-group-full {
            flex: 1 1 100%;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #002f6c;
        }

        input, select, textarea {
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        select[multiple] {
            min-height: 150px;
        }

        small {
            font-size: 13px;
            color: #777;
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: #ff6f00;
            color: white;
            padding: 14px 25px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #e65c00;
        }

        @media (max-width: 768px) {
            .form-group {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-plus"></i> Nouvelle fiche impliqué</h1>
    <form method="POST">
        <div class="form-group">
            <label for="numero"><i class="fas fa-hashtag"></i> Numéro de fiche</label>
            <input type="text" id="numero" name="numero" value="{{ numero_prevu }}" readonly>
        </div>

        <div class="form-group">
            <label for="humain"><i class="fas fa-user-tag"></i> Type</label>
            <select name="humain">
                <option value="True">Humain</option>
                <option value="False">Matériel</option>
            </select>
        </div>

        <div class="form-group">
            <label for="nom"><i class="fas fa-user"></i> Nom</label>
            <input type="text" name="nom">
        </div>

        <div class="form-group">
            <label for="prenom"><i class="fas fa-user"></i> Prénom</label>
            <input type="text" name="prenom">
        </div>

        <div class="form-group">
            <label for="date_naissance"><i class="fas fa-calendar"></i> Date de naissance</label>
            <input type="date" name="date_naissance">
        </div>

        <div class="form-group">
            <label for="nationalite"><i class="fas fa-flag"></i> Nationalité</label>
            <select name="nationalite">
                <option value="France" selected>France</option>
                {% for country in countries %}
                    {% if country != 'France' %}
                        <option value="{{ country }}">{{ country }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>

        <div class="form-group-full">
            <label for="adresse"><i class="fas fa-home"></i> Adresse</label>
            <input type="text" name="adresse">
        </div>

        <div class="form-group">
            <label for="telephone"><i class="fas fa-phone"></i> Téléphone</label>
            <input type="text" name="telephone">
        </div>

        <div class="form-group">
            <label for="personne_a_prevenir"><i class="fas fa-user-friends"></i> Personne à prévenir</label>
            <input type="text" name="personne_a_prevenir">
        </div>

        <div class="form-group">
            <label for="tel_personne_a_prevenir"><i class="fas fa-phone-volume"></i> Téléphone à prévenir</label>
            <input type="text" name="tel_personne_a_prevenir">
        </div>

        <div class="form-group">
            <label for="recherche_personne"><i class="fas fa-search"></i> Recherche de personne</label>
            <textarea name="recherche_personne" rows="2"></textarea>
        </div>

        <div class="form-group">
            <label for="difficulte"><i class="fas fa-exclamation-circle"></i> Difficultés</label>
            <textarea name="difficulte" rows="2"></textarea>
        </div>

        <div class="form-group">
            <label for="competences"><i class="fas fa-tools"></i> Compétences</label>
            <select name="competences" id="competences" multiple size="6" class="form-control">
                {% for c in competences_list %}
                    <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
            <small>Maintenez Ctrl (Windows) ou Cmd (Mac) pour sélectionner plusieurs compétences.</small>
        </div>

        <div class="form-group">
            <label for="effets_perso"><i class="fas fa-suitcase"></i> Effets personnels</label>
            <input type="text" name="effets_perso">
        </div>

        <div class="form-group">
            <label for="destination"><i class="fas fa-location-arrow"></i> Destination</label>
            <input type="text" name="destination">
        </div>

        <div class="form-group">
            <label for="moyen_transport"><i class="fas fa-bus"></i> Moyen de transport</label>
            <input type="text" name="moyen_transport">
        </div>

        <!-- Heure d’arrivée (JS) -->
        <input type="hidden" name="heure_arrivee" id="heure_arrivee_js">

        <div class="form-group-full">
            <button type="submit"><i class="fas fa-save"></i> Enregistrer la fiche</button>
        </div>
    </form>
</div>

<script>
document.querySelector("form").addEventListener("submit", function () {
    const now = new Date();
    now.setHours(now.getHours() + 2);
    const formatted = now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0') + ' ' +
        String(now.getHours()).padStart(2, '0') + ':' +
        String(now.getMinutes()).padStart(2, '0') + ':' +
        String(now.getSeconds()).padStart(2, '0');
    document.getElementById("heure_arrivee_js").value = formatted;
});
</script>

</body>
</html>
