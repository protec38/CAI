<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer ou rejoindre un évènement</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #003b71;
            padding: 20px;
            text-align: center;
            color: white;
        }

        .header img {
            height: 80px;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            border-top: 6px solid #f58220;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            text-align: center;
            color: #003b71;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #f58220;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e57210;
        }

        .form-section {
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="{{ url_for('static', filename='logo-protection-civile.jpg') }}" alt="Logo Protection Civile">
        <h2>Protection Civile</h2>
    </div>

    <div class="container">
        <div class="form-section">
            <h1>Créer un nouvel évènement</h1>
            <form method="post">
                <label for="nom_evt">Nom de l'évènement</label>
                <input type="text" id="nom_evt" name="nom_evt" required>

                <label for="type_evt">Type d'évènement</label>
                <select id="type_evt" name="type_evt" required>
                    <option value="CAI">CAI</option>
                    <option value="CHU">CHU</option>
                    <option value="PRV">PRV</option>
                </select>

                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" name="adresse" required>

                <label for="statut">Statut</label>
                <select id="statut" name="statut" required>
                    <option value="En cours de gréement">En cours de gréement</option>
                    <option value="Ouvert">Ouvert</option>
                    <option value="Effectif dépassé">Effectif dépassé</option>
                    <option value="Complet">Complet</option>
                    <option value="Fermé">Fermé</option>
                </select>

                <button type="submit">Créer l'évènement</button>
            </form>
        </div>

        <div class="form-section">
            <h2>Rejoindre un évènement existant</h2>
            <form method="post" action="{{ url_for('main_bp.select_evenement') }}">
                <label for="evenement_id">Sélectionner un évènement</label>
                <select name="evenement_id" id="evenement_id" required>
                    <option value="" disabled selected>-- Choisir un évènement --</option>
                    {% for evt in evenements %}
                        <option value="{{ evt.id }}">{{ evt.nom }} ({{ evt.numero }})</option>
                    {% endfor %}
                </select>

                <button type="submit">Rejoindre l'évènement</button>
            </form>
            <a href="{{ url_for('main_bp.admin_utilisateurs') }}" class="btn">Utilisateurs</a>
        </div>
    </div>
</body>
</html>
