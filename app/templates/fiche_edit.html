<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier une fiche impliqué</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #002f6c, #ff6f00);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            color: #333;
        }

        h2 {
            text-align: center;
            color: #002f6c;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .form-group {
            flex: 1 1 45%;
            display: flex;
            flex-direction: column;
        }

        .form-group-full {
            flex: 1 1 100%;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #002f6c;
        }

        input, select, textarea {
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }

        select[multiple] {
            min-height: 150px;
        }

        .form-check {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .form-check input[type="checkbox"] {
            margin-right: 10px;
        }

        button, .btn-secondary {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button {
            background-color: #ff6f00;
            color: white;
        }

        button:hover {
            background-color: #e65c00;
        }

        .btn-secondary {
            background-color: #ccc;
            color: #000;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background-color: #bbb;
        }

        @media (max-width: 768px) {
            .form-group {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-edit"></i> Modifier une fiche impliqué</h2>

    <form method="POST">
        <div class="form-group">
            <label for="nom"><i class="fas fa-user"></i> Nom</label>
            <input type="text" name="nom" value="{{ fiche.nom }}" required>
        </div>

        <div class="form-group">
            <label for="prenom"><i class="fas fa-user"></i> Prénom</label>
            <input type="text" name="prenom" value="{{ fiche.prenom }}">
        </div>

        <div class="form-group">
            <label for="numero"><i class="fas fa-hashtag"></i> Numéro de fiche</label>
            <input type="text" name="numero" value="{{ fiche.numero }}" disabled>
        </div>

        <div class="form-group">
            <label for="statut"><i class="fas fa-clipboard-check"></i> Statut</label>
            <select name="statut" required>
                <option value="présent" {% if fiche.statut == "présent" %}selected{% endif %}>Présent</option>
                <option value="sorti" {% if fiche.statut == "sorti" %}selected{% endif %}>Sorti</option>
                <option value="supprimé" {% if fiche.statut == "supprimé" %}selected{% endif %}>Supprimé</option>
            </select>
        </div>

        <div class="form-group">
            <label for="telephone"><i class="fas fa-phone"></i> Téléphone</label>
            <input type="text" name="telephone" value="{{ fiche.telephone }}">
        </div>

        <div class="form-group">
            <label for="nationalite"><i class="fas fa-flag"></i> Nationalité</label>
            <input type="text" name="nationalite" value="{{ fiche.nationalite }}">
        </div>

        <div class="form-group">
            <label for="difficulte"><i class="fas fa-exclamation-circle"></i> Difficultés</label>
            <textarea name="difficulte" rows="3">{{ fiche.difficultes }}</textarea>
        </div>

        <!-- ✅ Liste déroulante multiple avec pré-sélection -->
        <div class="form-group">
            <label for="competences"><i class="fas fa-tools"></i> Compétences</label>
            <select name="competences" id="competences" multiple>
                {% set selected_competences = fiche.competences.split(',') if fiche.competences else [] %}
                {% for c in competences_list %}
                    <option value="{{ c }}" {% if c in selected_competences %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
            <small>Maintenez Ctrl (Windows) ou Cmd (Mac) pour sélectionner plusieurs compétences.</small>
        </div>

        <div class="form-group">
            <label for="adresse"><i class="fas fa-home"></i> Adresse</label>
            <input type="text" name="adresse" value="{{ fiche.adresse }}">
        </div>

        <div class="form-group">
            <label for="date_naissance"><i class="fas fa-calendar"></i> Date de naissance</label>
            <input type="date" name="date_naissance" value="{{ fiche.date_naissance.strftime('%Y-%m-%d') if fiche.date_naissance }}">
        </div>

        <div class="form-group">
            <label for="recherche_personne"><i class="fas fa-search"></i> Recherche de personne</label>
            <input type="text" name="recherche_personne" value="{{ fiche.recherche_personne }}">
        </div>

        <div class="form-group">
            <label for="numero_recherche"><i class="fas fa-search-location"></i> N° recherche</label>
            <input type="text" name="numero_recherche" value="{{ fiche.numero_recherche }}">
        </div>

        <div class="form-check form-group-full">
            <input type="checkbox" name="est_animal" id="est_animal" {% if fiche.est_animal %}checked{% endif %}>
            <label for="est_animal">Est un animal</label>
        </div>

        <div class="form-group-full">
            <button type="submit"><i class="fas fa-save"></i> Sauvegarder</button>
            <a href="{{ url_for('main_bp.dashboard', evenement_id=fiche.evenement.id) }}" class="btn-secondary">← Retour</a>
        </div>
    </form>
</div>

</body>
</html>
