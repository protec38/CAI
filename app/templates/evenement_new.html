<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un événement</title>
    <style>
        body {
            background: linear-gradient(to right, #002f6c, #ff6f00);
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #002f6c;
            color: white;
            border: none;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            color: #002f6c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Créer un événement</h2>
        <form method="POST">
            <label>Nom de l’événement :</label>
            <input type="text" name="nom" required>

            <label>Type :</label>
            <select name="type">
                <option value="CHU">CHU</option>
                <option value="CAI">CAI</option>
                <option value="PRV">PRV</option>
            </select>

            <button type="submit">Créer</button>
        </form>
    </div>
</body>
</html>
