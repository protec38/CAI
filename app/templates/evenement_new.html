<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un nouvel évènement</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #444;
        }
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Créer un nouvel évènement</h1>
        <form method="post">
            <label for="nom">Nom de l'évènement</label>
            <input type="text" id="nom" name="nom" required>

            <label for="numero">Numéro</label>
            <input type="text" id="numero" name="numero" required>

            <label for="adresse">Adresse</label>
            <input type="text" id="adresse" name="adresse" required>

            <label for="date_ouverture">Date d'ouverture</label>
            <input type="date" id="date_ouverture" name="date_ouverture" required>

            <label for="statut">Statut</label>
            <select id="statut" name="statut">
                <option value="En cours de gréement">En cours de gréement</option>
                <option value="Ouvert">Ouvert</option>
                <option value="Effectif dépassé">Effectif dépassé</option>
                <option value="Complet">Complet</option>
                <option value="Fermé">Fermé</option>
            </select>

            <button type="submit">Créer l'évènement</button>
        </form>
    </div>
</body>
</html>
