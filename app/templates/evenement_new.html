<!DOCTYPE html>
<html>
<head>
    <title>Créer ou Sélectionner un Événement</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Créer un nouvel événement</h2>
        <form method="POST">
            <input type="hidden" name="create_event" value="1">
            <input type="text" name="nom" placeholder="Nom de l'événement" required>
            <select name="type_evt" required>
                <option value="">-- Type --</option>
                <option value="CAI">CAI</option>
                <option value="CHU">CHU</option>
            </select>
            <button type="submit">Créer l’événement</button>
        </form>

        <hr>

        <h2>Ou accéder à un événement existant</h2>
        <form method="POST">
            <select name="selected_event" required>
                {% for evt in evenements %}
                    <option value="{{ evt.id }}">{{ evt.numero }} - {{ evt.nom }}</option>
                {% endfor %}
            </select>
            <button type="submit">Accéder à l’événement</button>
        </form>
    </div>
</body>
</html>
