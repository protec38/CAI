<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Créer' if mode == 'create' else 'Modifier' }} un utilisateur</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #002f6c, #ff6f00);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            border-top: 6px solid #f58220;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #003b71;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 30px;
            width: 100%;
            background-color: #f58220;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e36d00;
        }

        a.btn-back {
            display: inline-block;
            margin-top: 20px;
            color: #003b71;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ 'Créer' if mode == 'create' else 'Modifier' }} un utilisateur</h1>

        <form method="post">
            <label for="nom">Nom complet</label>
            <input type="text" id="nom" name="nom" required value="{{ utilisateur.nom if utilisateur else '' }}">
            <label for="nom_utilisateur">Nom d’utilisateur</label>
            <input type="text" id="nom_utilisateur" name="nom_utilisateur" required value="{{ utilisateur.nom_utilisateur if utilisateur else '' }}">


            <label for="role">Rôle</label>
            <select id="role" name="role" required>
                <option value="">-- Choisir un rôle --</option>
                <option value="entree" {% if utilisateur and utilisateur.role == 'entree' %}selected{% endif %}>Entrée/Sortie</option>
                <option value="bagages" {% if utilisateur and utilisateur.role == 'bagages' %}selected{% endif %}>Gestion bagages</option>
                <option value="secouriste" {% if utilisateur and utilisateur.role == 'secouriste' %}selected{% endif %}>Secouriste</option>
                <option value="aep" {% if utilisateur and utilisateur.role == 'aep' %}selected{% endif %}>AEP</option>
                <option value="logisticien" {% if utilisateur and utilisateur.role == 'logisticien' %}selected{% endif %}>Logisticien</option>
                <option value="responsable" {% if utilisateur and utilisateur.role == 'responsable' %}selected{% endif %}>Responsable de centre</option>
                <option value="codep" {% if utilisateur and utilisateur.role == 'codep' %}selected{% endif %}>CODEP</option>
                <option value="autorite" {% if utilisateur and utilisateur.role == 'autorite' %}selected{% endif %}>Autorité</option>
            </select>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" {% if mode == 'create' %}required{% endif %}>

            <button type="submit">{{ 'Créer' if mode == 'create' else 'Mettre à jour' }}</button>
        </form>

        <a href="{{ url_for('main_bp.admin_utilisateurs') }}" class="btn-back">← Retour à la liste des utilisateurs</a>
    </div>
</body>
</html>
