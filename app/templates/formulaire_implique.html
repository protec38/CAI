<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nouvelle fiche impliqué</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="form-container">
    <h2>Nouvelle fiche impliqué</h2>
    <form method="POST">
      <label>Humain :</label>
      <select name="humain">
        <option value="1">Oui</option>
        <option value="0">Animal</option>
      </select>

      <input type="text" name="nom" placeholder="Nom">
      <input type="text" name="prenom" placeholder="Prénom">
      <input type="date" name="date_naissance" placeholder="Date de naissance">
      <input type="text" name="nationalite" placeholder="Nationalité">
      <input type="text" name="adresse" placeholder="Adresse">
      <input type="text" name="telephone" placeholder="Téléphone">
      <input type="text" name="personne_a_prevenir" placeholder="Personne à prévenir">
      <input type="text" name="tel_personne_a_prevenir" placeholder="Téléphone personne à prévenir">
      <input type="text" name="recherche_personne" placeholder="Recherche de personne">
      <input type="text" name="difficulte" placeholder="Difficultés particulières">
      <input type="text" name="competences" placeholder="Compétences particulières">
      <input type="text" name="effets_perso" placeholder="Effets personnels">

      <button type="submit">Créer</button>
    </form>
  </div>
</body>
</html>
