<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Signaler une sortie</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="form-container">
    <h2>Sortie - Fiche n°{{ fiche.numero_fiche }}</h2>

    <form method="POST">
      <label for="destination">Destination</label>
      <input type="text" name="destination" placeholder="Destination finale" required>

      <label for="moyen_transport">Moyen de transport</label>
      <input type="text" name="moyen_transport" placeholder="Ex : Bus, Ambulance" required>

      <button type="submit">Valider la sortie</button>
    </form>

    <a href="{{ url_for('main.dashboard') }}">⬅ Retour</a>
  </div>
</body>
</html>
