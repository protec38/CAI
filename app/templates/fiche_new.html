<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nouvelle fiche impliqué</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h2>Créer une fiche impliqué</h2>

    <form method="POST">
      <label>
        Type :
        <select name="type">
          <option value="humain">Humain</option>
          <option value="animal">Animal</option>
        </select>
      </label>

      <label>Nom : <input type="text" name="nom" required></label>
      <label>Prénom : <input type="text" name="prenom" required></label>
      <label>Date de naissance : <input type="date" name="date_naissance"></label>
      <label>Nationalité : <input type="text" name="nationalite"></label>
      <label>Adresse : <input type="text" name="adresse"></label>
      <label>Téléphone : <input type="text" name="telephone"></label>

      <label>Personne à prévenir : <input type="text" name="personne_a_prevenir"></label>
      <label>Numéro de la personne à prévenir : <input type="text" name="telephone_a_prevenir"></label>

      <label>Recherche de personne :
        <textarea name="recherche_personne" rows="2"></textarea>
      </label>

      <label>Difficulté :
        <textarea name="difficulte" rows="2"></textarea>
      </label>

      <label>Compétences :
        <textarea name="competences" rows="2"></textarea>
      </label>

      <label>Effets personnels :
        <input type="text" name="effets_perso">
      </label>

      <button type="submit">Enregistrer</button>
      <a href="{{ url_for('main.dashboard') }}">Annuler</a>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>
</body>
</html>
