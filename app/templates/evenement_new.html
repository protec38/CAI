<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des événements - CAI/CHU</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
            padding: 40px;
        }
        h2 {
            color: #2c3e50;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select, button {
            padding: 10px;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
        }
        .section {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>

<div class="section">

    <h2>Créer un nouvel événement</h2>

    {% if user.is_admin or user.role == 'codep' %}
    <form method="POST">
        <label for="nom">Nom de l’événement :</label>
        <input type="text" name="nom" required>

        <label for="type_evt">Type d’événement :</label>
        <select name="type_evt" required>
            <option value="CAI">CAI</option>
            <option value="CHU">CHU</option>
            <option value="PRV">PRV</option>
        </select>

        <button type="submit">Créer</button>
    </form>
    {% endif %}

    <h2>Sélectionner un événement existant</h2>

    <form method="POST" action="{{ url_for('main_bp.select_evenement') }}">
        <label for="evenement_id">Événement :</label>
        <select name="evenement_id" required>
            {% for evt in evenements %}
                <option value="{{ evt.id }}">{{ evt.nom }} ({{ evt.numero }})</option>
            {% endfor %}
        </select>

        <button type="submit">Entrer</button>
    </form>

</div>

</body>
</html>
